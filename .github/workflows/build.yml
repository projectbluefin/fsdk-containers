name: Build images

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  BUILD_IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@ace6ebe54a6a0c86dfb5f7764b17f793b6925bc3 # v2
        with:
          tool: just
      - name: Resolve element graph
        run: just validate

  build:
    if: github.event_name != 'pull_request'
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@ace6ebe54a6a0c86dfb5f7764b17f793b6925bc3 # v2
        with:
          tool: just
      - name: Log in to ghcr
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build and verify all images
        env:
          OCI_IMAGE_CREATED: ${{ github.event.head_commit.timestamp }}
          OCI_IMAGE_REVISION: ${{ github.sha }}
        run: |
          for IMAGE in base static skopeo lab-runner loki; do
            echo "::group::Build ${IMAGE}"
            BUILD_IMAGE_NAME=${IMAGE} just build
            BUILD_IMAGE_NAME=${IMAGE} just verify
            BUILD_IMAGE_NAME=${IMAGE} just tag-push "${BUILD_IMAGE_REGISTRY}/${IMAGE}-${{ matrix.arch }}"
            echo "::endgroup::"
          done

  manifest:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@ace6ebe54a6a0c86dfb5f7764b17f793b6925bc3 # v2
        with:
          tool: just
      - name: Log in to ghcr
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Assemble multi-arch manifests
        run: |
          set -euo pipefail
          for IMAGE in base static skopeo lab-runner loki; do
            REPO="${BUILD_IMAGE_REGISTRY}/${IMAGE}"
            for t in $(just tags); do
              podman manifest create "${REPO}:${t}"
              podman manifest add "${REPO}:${t}" "docker://${REPO}-x86_64:${t}"
              podman manifest add "${REPO}:${t}" "docker://${REPO}-aarch64:${t}"
              podman manifest push --all "${REPO}:${t}" "docker://${REPO}:${t}"
              echo "==> published ${REPO}:${t} (multi-arch)"
            done
          done
